version: '3'

services:
  ncdb:
    image: mariadb:10.6
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - $NC_DB_PATH:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      - MYSQL_PASSWORD=$MYSQL_PASSWORD
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  redis:
    image: redis:alpine
    restart: always

  app:
    image: nextcloud
    restart: always
    ports:
      - 8282:80
    links:
      - ncdb
    volumes:
      - $NC_DATA_PATH:/var/www/html
    environment:
      - MYSQL_PASSWORD=$MYSQL_PASSWORD
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=ncdb
    depends_on:
      - ncdb
  
  cron:
    image: nextcloud:apache
    restart: always
    volumes:
      - $NC_DATA_PATH:/var/www/html:z
    entrypoint: /cron.sh
    depends_on:
      - ncdb
      - redis