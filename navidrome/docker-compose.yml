services:
  navidrome:
    image: deluan/navidrome:latest
    user: 1000:1000 # should be owner of volumes
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      - ND_SCANNER_SCHEDULE=0 7 * * *
      - ND_LOGLEVEL=info
    volumes:
      - "$ND_DATA:/data"
      - "$ND_MUSIC:/music:ro"